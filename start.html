<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>New tab</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #000000;
    color: #cdd6f4;
    font-family: "JetBrainsMono Nerd Font", "Inter", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
  }
  #clock {
    font-size: 64px;
    font-weight: 600;
    letter-spacing: 2px;
    color: #cdd6f4;
  }
  #date {
    color: #6c7086;
    font-size: 15px;
    margin-top: -18px;
  }
  form.search {
    background: rgba(0, 0, 0, 0.9);
    border: 1px solid rgba(108, 112, 134, 0.45);
    border-radius: 0;
    padding: 4px 6px;
    width: min(520px, 86vw);
    display: flex;
    transition: border-color .15s;
  }
  form.search:focus-within { border-color: #a6adc8; }
  form.search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #cdd6f4;
    font: inherit;
    font-size: 15px;
    padding: 10px 14px;
  }
  input::placeholder { color: #6c7086; }

  .links {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 86vw;
  }
  .links a {
    position: relative;
    background: rgba(0, 0, 0, 0.85);
    border: 1px solid rgba(137, 180, 250, 0.15);
    border-radius: 12px;
    color: #a6adc8;
    text-decoration: none;
    padding: 9px 18px;
    font-size: 13px;
    transition: all .15s;
  }
  .links a:hover {
    color: #89b4fa;
    border-color: rgba(137, 180, 250, 0.4);
    transform: translateY(-2px);
  }
  .links a .rm {
    position: absolute;
    top: -7px;
    right: -7px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #f38ba8;
    color: #000000;
    font-size: 11px;
    line-height: 18px;
    text-align: center;
    display: none;
    cursor: pointer;
  }
  .links a:hover .rm { display: block; }

  #addbtn {
    background: rgba(0, 0, 0, 0.85);
    border: 1px solid rgba(137, 180, 250, 0.25);
    border-radius: 50%;
    width: 38px;
    height: 38px;
    color: #89b4fa;
    font-size: 19px;
    cursor: pointer;
    transition: all .15s;
  }
  #addbtn:hover {
    border-color: #89b4fa;
    background: #16161d;
    transform: translateY(-2px);
  }

  #addform {
    display: none;
    background: rgba(0, 0, 0, 0.9);
    border: 1px solid rgba(137, 180, 250, 0.25);
    border-radius: 14px;
    padding: 10px;
    gap: 8px;
  }
  #addform.open { display: flex; }
  #addform input {
    background: #000000;
    border: 1px solid rgba(108, 112, 134, 0.4);
    border-radius: 9px;
    color: #cdd6f4;
    font: inherit;
    font-size: 13px;
    padding: 7px 11px;
    outline: none;
    width: 150px;
  }
  #addform input:focus { border-color: #89b4fa; }
  #addform button {
    background: #89b4fa;
    border: none;
    border-radius: 9px;
    color: #000000;
    font: inherit;
    font-size: 13px;
    font-weight: bold;
    padding: 7px 15px;
    cursor: pointer;
  }
  #addform button:hover { background: #b4d0fb; }

  /* background image mode */
  body.hasbg {
    background-size: cover;
    background-position: center;
  }
  body.hasbg::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 0;
  }
  body > * { z-index: 1; }
  body.hasbg #clock, body.hasbg #date { text-shadow: 0 2px 14px rgba(0,0,0,.8); }
  body.hasbg #date { color: #bac2de; }

  /* gear + settings panel */
  #gear {
    position: fixed;
    right: 22px;
    bottom: 22px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.85);
    border: 1px solid rgba(137, 180, 250, 0.25);
    color: #6c7086;
    font-size: 18px;
    cursor: pointer;
    transition: all .25s;
    z-index: 2;
  }
  #gear:hover {
    color: #89b4fa;
    border-color: #89b4fa;
    transform: rotate(45deg);
  }
  #settings {
    position: fixed;
    right: 22px;
    bottom: 74px;
    display: none;
    flex-direction: column;
    gap: 10px;
    background: rgba(0, 0, 0, 0.95);
    border: 1px solid rgba(137, 180, 250, 0.25);
    border-radius: 14px;
    padding: 14px;
    z-index: 2;
  }
  #settings.open { display: flex; }
  #settings h3 {
    font-size: 12px;
    font-weight: normal;
    color: #6c7086;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .thumbs {
    display: grid;
    grid-template-columns: repeat(3, 92px);
    gap: 8px;
  }
  .thumb {
    height: 52px;
    border-radius: 9px;
    background-color: #000000;
    background-size: cover;
    background-position: center;
    border: 2px solid transparent;
    cursor: pointer;
    color: #6c7086;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color .15s;
  }
  .thumb:hover { border-color: rgba(137, 180, 250, 0.5); }
  .thumb.sel { border-color: #89b4fa; }

  /* privacy section */
  .privacy { display: flex; flex-direction: column; gap: 10px; }
  .switchrow {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #cdd6f4;
    cursor: pointer;
  }
  .switchrow span:first-child { flex: 1; }
  .switchrow input { display: none; }
  .slider {
    width: 34px;
    height: 19px;
    border-radius: 10px;
    background: #a6adc8;
    position: relative;
    transition: background .15s;
    flex-shrink: 0;
  }
  .slider::after {
    content: "";
    position: absolute;
    top: 2.5px;
    left: 3px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #000000;
    transition: transform .15s;
  }
  .switchrow input:checked + .slider { background: #ffffff; }
  .switchrow input:checked + .slider::after { transform: translateX(14px); }
  .privbtns { display: flex; gap: 8px; }
  .privbtns button {
    flex: 1;
    background: #000000;
    border: 1px solid rgba(108, 112, 134, 0.4);
    border-radius: 9px;
    color: #a6adc8;
    font: inherit;
    font-size: 12px;
    padding: 7px 0;
    cursor: pointer;
    transition: all .15s;
  }
  .privbtns button:hover { color: #89b4fa; border-color: #89b4fa; }
  #clearhist:hover { color: #f38ba8; border-color: #f38ba8; }
  .hint { font-size: 11px; color: #6c7086; }

</style>
</head>
<body>
  <div id="clock">--:--</div>
  <div id="date"></div>
  <form class="search" action="https://www.google.com/search">
    <input name="q" placeholder="Search Google" autofocus autocomplete="off">
  </form>
  <div class="links" id="links"></div>
  <form id="addform" autocomplete="off">
    <input id="addurl" placeholder="wikipedia.org" list="sites">
    <input id="addname" placeholder="Name (e.g. Wikipedia)" maxlength="20">
    <button type="submit">Add</button>
  </form>
  <datalist id="sites">
    <option value="wikipedia.org"><option value="youtube.com">
    <option value="github.com"><option value="google.com">
    <option value="reddit.com"><option value="amazon.de">
    <option value="ebay.de"><option value="netflix.com">
    <option value="spotify.com"><option value="twitch.tv">
    <option value="instagram.com"><option value="tiktok.com">
    <option value="discord.com"><option value="translate.google.com">
    <option value="maps.google.com"><option value="web.de">
    <option value="gmx.net"><option value="modrinth.com">
  </datalist>

  <button id="gear" title="Customize">⚙</button>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <div id="settings">
    <h3>Background</h3>
    <div class="thumbs" id="thumbs"></div>
    <input type="file" id="bgfile" accept="image/*" hidden>
    <h3>&#128737;&#65039; Privacy</h3>
    <div class="privacy">
      <label class="switchrow">
        <span>Save history</span>
        <input type="checkbox" id="histtoggle" checked>
        <span class="slider"></span>
      </label>
      <div class="privbtns">
        <button type="button" id="viewhist">View history</button>
        <button type="button" id="clearhist">Clear history</button>
      </div>
    </div>
  </div>
<script>
  const DEFAULTS = [
    { name: "GitHub", url: "https://github.com" },
    { name: "YouTube", url: "https://www.youtube.com" },
  ];
  let links = JSON.parse(localStorage.getItem("quicklinks") || "null") || DEFAULTS;

  function save() { localStorage.setItem("quicklinks", JSON.stringify(links)); }

  function render() {
    const box = document.getElementById("links");
    box.innerHTML = "";
    links.forEach((l, i) => {
      const a = document.createElement("a");
      a.href = l.url;
      a.textContent = l.name;
      const rm = document.createElement("span");
      rm.className = "rm";
      rm.textContent = "✕";
      rm.title = "Remove";
      rm.onclick = (e) => {
        e.preventDefault();
        e.stopPropagation();
        links.splice(i, 1);
        save();
        render();
      };
      a.appendChild(rm);
      box.appendChild(a);
    });
    const plus = document.createElement("button");
    plus.id = "addbtn";
    plus.textContent = "+";
    plus.title = "Add a link";
    plus.onclick = () => {
      document.getElementById("addform").classList.toggle("open");
      document.getElementById("addname").focus();
    };
    box.appendChild(plus);
  }

  // auto-fill the name from the address: "wikipedia.org" -> "Wikipedia"
  document.getElementById("addurl").addEventListener("input", () => {
    const nameBox = document.getElementById("addname");
    if (nameBox.dataset.touched === "1") return;
    let host = document.getElementById("addurl").value.trim()
      .replace(/^https?:\/\//, "").replace(/^www\./, "").split("/")[0];
    const base = host.split(".")[0];
    nameBox.value = base ? base.charAt(0).toUpperCase() + base.slice(1) : "";
  });
  document.getElementById("addname").addEventListener("input", (e) => {
    e.target.dataset.touched = e.target.value ? "1" : "";
  });

  document.getElementById("addform").onsubmit = (e) => {
    e.preventDefault();
    const name = document.getElementById("addname").value.trim();
    let url = document.getElementById("addurl").value.trim();
    if (!name || !url) return;
    if (!url.includes("://")) url = "https://" + url;
    links.push({ name, url });
    save();
    document.getElementById("addname").value = "";
    document.getElementById("addname").dataset.touched = "";
    document.getElementById("addurl").value = "";
    document.getElementById("addform").classList.remove("open");
    render();
  };

  render();

  // ---- background customization ----
  const BGS = [
    "backgrounds/nature-1015.jpg",
    "backgrounds/nature-1016.jpg",
    "backgrounds/nature-1018.jpg",
    "backgrounds/nature-1039.jpg",
  ];

  function applyBg() {
    const bg = localStorage.getItem("bg") || "";
    if (bg) {
      document.body.style.backgroundImage = `url("${bg}")`;
      document.body.classList.add("hasbg");
    } else {
      document.body.style.backgroundImage = "";
      document.body.classList.remove("hasbg");
    }
  }

  function renderThumbs() {
    const box = document.getElementById("thumbs");
    box.innerHTML = "";
    const current = localStorage.getItem("bg") || "";
    const mk = (label, value, image) => {
      const t = document.createElement("div");
      t.className = "thumb" + (current === value ? " sel" : "");
      if (image) t.style.backgroundImage = `url("${image}")`;
      else t.textContent = label;
      t.title = label;
      t.onclick = () => {
        localStorage.setItem("bg", value);
        applyBg();
        renderThumbs();
      };
      return t;
    };
    box.appendChild(mk("None", "", null));
    BGS.forEach((b) => box.appendChild(mk("Nature", b, b)));
    const custom = localStorage.getItem("custombg");
    if (custom) box.appendChild(mk("Your image", custom, custom));
    const up = document.createElement("div");
    up.className = "thumb";
    up.textContent = "+ Add";
    up.title = "Use your own image";
    up.onclick = () => document.getElementById("bgfile").click();
    box.appendChild(up);
  }

  document.getElementById("bgfile").onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const img = new Image();
    img.onload = () => {
      // downscale so it fits in local storage
      const scale = Math.min(1, 1920 / img.width);
      const c = document.createElement("canvas");
      c.width = Math.round(img.width * scale);
      c.height = Math.round(img.height * scale);
      c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
      const data = c.toDataURL("image/jpeg", 0.82);
      try {
        localStorage.setItem("custombg", data);
        localStorage.setItem("bg", data);
      } catch (err) {
        alert("That image is too large, sorry — try a smaller one.");
        return;
      }
      applyBg();
      renderThumbs();
    };
    img.src = URL.createObjectURL(file);
  };

  document.getElementById("gear").onclick = () => {
    document.getElementById("settings").classList.toggle("open");
    renderThumbs();
  };

  // Esc closes the settings panel
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape")
      document.getElementById("settings").classList.remove("open");
  });

  // coming back from the history page: reopen the panel
  if (sessionStorage.getItem("reopenSettings")) {
    sessionStorage.removeItem("reopenSettings");
    document.getElementById("settings").classList.add("open");
    renderThumbs();
  }

  applyBg();

  // ---- privacy / history (talks to the browser via QWebChannel) ----
  let bridge = null;
  if (typeof qt !== "undefined") {
    new QWebChannel(qt.webChannelTransport, (ch) => {
      bridge = ch.objects.bridge;
      syncSettings();
    });
  }
  function syncSettings() {
    if (!bridge) return;
    bridge.historyEnabled((v) => {
      document.getElementById("histtoggle").checked = v;
    });
  }
  // tabs opened earlier would show stale switches; re-sync when shown
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) syncSettings();
  });
  document.getElementById("histtoggle").onchange = (e) => {
    if (bridge) bridge.setHistoryEnabled(e.target.checked);
  };
  document.getElementById("viewhist").onclick = () => {
    // so Esc on the history page brings you back into this panel
    sessionStorage.setItem("reopenSettings", "1");
    location.href = "history.html";
  };
  document.getElementById("clearhist").onclick = (e) => {
    if (bridge) bridge.clearHistory();
    e.target.textContent = "Cleared ✓";
    setTimeout(() => { e.target.textContent = "Clear history"; }, 1500);
  };

  function tick() {
    const now = new Date();
    document.getElementById("clock").textContent =
      now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    document.getElementById("date").textContent =
      now.toLocaleDateString([], { weekday: "long", day: "numeric", month: "long" });
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
