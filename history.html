<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>History</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000000;
    color: #cdd6f4;
    font-family: "JetBrainsMono Nerd Font", "Inter", sans-serif;
    padding: 40px 0 60px;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 0 20px; }
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 26px;
  }
  h1 { font-size: 22px; font-weight: 600; flex: 1; }
  #search {
    background: rgba(13, 13, 18, 0.9);
    border: 1px solid rgba(137, 180, 250, 0.25);
    border-radius: 12px;
    color: #cdd6f4;
    font: inherit;
    font-size: 13px;
    padding: 9px 14px;
    outline: none;
    width: 240px;
  }
  #search:focus { border-color: #89b4fa; }
  #clear {
    background: rgba(13, 13, 18, 0.9);
    border: 1px solid rgba(243, 139, 168, 0.35);
    border-radius: 12px;
    color: #f38ba8;
    font: inherit;
    font-size: 13px;
    padding: 9px 14px;
    cursor: pointer;
  }
  #clear:hover { background: rgba(243, 139, 168, 0.15); }
  .day {
    color: #6c7086;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin: 22px 0 8px;
  }
  .entry {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(13, 13, 18, 0.6);
    border: 1px solid transparent;
    border-radius: 11px;
    padding: 9px 14px;
    margin-bottom: 5px;
    text-decoration: none;
    transition: all .12s;
  }
  .entry:hover { border-color: rgba(137, 180, 250, 0.35); background: rgba(13, 13, 18, 0.95); }
  .entry img { width: 16px; height: 16px; border-radius: 4px; }
  .entry .time { color: #6c7086; font-size: 12px; width: 44px; flex-shrink: 0; }
  .entry .title {
    color: #cdd6f4;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .entry .host { color: #6c7086; font-size: 12px; flex-shrink: 0; }
  #empty { color: #6c7086; margin-top: 40px; text-align: center; }

</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 id="t_history">History</h1>
      <input id="search" placeholder="Search history" autocomplete="off">
      <button id="clear">Clear all</button>
    </header>
    <div id="list"></div>
    <div id="empty" hidden>No history.</div>
  </div>
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<script>
  let bridge = null, entries = [];
  let STR = {history: "History", searchHistory: "Search history",
    clearAll: "Clear all", noHistory: "No history.",
    today: "Today", yesterday: "Yesterday", lang: undefined};

  function dayLabel(t) {
    const d = new Date(t * 1000), now = new Date();
    const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    if (d >= midnight) return STR.today;
    if (d >= new Date(midnight - 86400000)) return STR.yesterday;
    return d.toLocaleDateString(STR.lang || [],
      { weekday: "long", day: "numeric", month: "long" });
  }

  function render() {
    const q = document.getElementById("search").value.toLowerCase();
    const list = document.getElementById("list");
    list.innerHTML = "";
    const shown = entries.filter(e =>
      e.title.toLowerCase().includes(q) || e.url.toLowerCase().includes(q));
    document.getElementById("empty").hidden = shown.length > 0;
    let lastDay = null;
    for (const e of [...shown].reverse()) {
      const label = dayLabel(e.t);
      if (label !== lastDay) {
        const h = document.createElement("div");
        h.className = "day";
        h.textContent = label;
        list.appendChild(h);
        lastDay = label;
      }
      const host = new URL(e.url).hostname.replace(/^www\./, "");
      const a = document.createElement("a");
      a.className = "entry";
      a.href = e.url;
      const icon = document.createElement("img");
      icon.src = "https://www.google.com/s2/favicons?sz=32&domain=" + host;
      const time = document.createElement("span");
      time.className = "time";
      time.textContent = new Date(e.t * 1000).toLocaleTimeString([],
        { hour: "2-digit", minute: "2-digit" });
      const title = document.createElement("span");
      title.className = "title";
      title.textContent = e.title;
      const hostEl = document.createElement("span");
      hostEl.className = "host";
      hostEl.textContent = host;
      a.append(icon, time, title, hostEl);
      list.appendChild(a);
    }
  }

  // Esc leaves the history page (back to the start page settings)
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && history.length > 1) history.back();
  });

  document.getElementById("search").oninput = render;
  document.getElementById("clear").onclick = () => {
    if (bridge) bridge.clearHistory();
    entries = [];
    render();
  };

  if (typeof qt !== "undefined") {
    new QWebChannel(qt.webChannelTransport, (ch) => {
      bridge = ch.objects.bridge;
      bridge.uiStrings((j) => {
        try {
          Object.assign(STR, JSON.parse(j));
          document.title = STR.history;
          document.getElementById("t_history").textContent = STR.history;
          document.getElementById("search").placeholder = STR.searchHistory;
          document.getElementById("clear").textContent = STR.clearAll;
          document.getElementById("empty").textContent = STR.noHistory;
        } catch (e) {}
        bridge.getHistory((json) => { entries = JSON.parse(json); render(); });
      });
    });
  } else {
    render();
  }
</script>
</body>
</html>
